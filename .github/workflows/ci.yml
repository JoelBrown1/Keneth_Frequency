name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]

jobs:
  test:
    name: Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (Riverpod + Drift)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run tests
        run: flutter test
        # Includes:
        #   - S10-05: synthetic_sh4_pipeline_test.dart (SH-4 peak within ±50 Hz — DoD)
        #   - export_service_test.dart, export_round_trip_test.dart
        #   - screens_sprint10_test.dart (all session screens)
        #   - All prior sprint tests (194 baseline)
        # Note: pocketfft dylib-dependent tests skip automatically when
        #       libpocketfft.dylib is absent (no native build step in CI).

  build:
    name: Build macOS
    runs-on: macos-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (Riverpod + Drift)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build macOS release
        run: flutter build macos --release

      - name: Upload .app artifact
        uses: actions/upload-artifact@v4
        with:
          name: keneth-frequency-macos
          path: build/macos/Build/Products/Release/keneth_frequency.app
