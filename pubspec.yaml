name: keneth_frequency
description: Guitar pickup resonant frequency measurement tool.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0

  # Navigation
  go_router: ^14.0.0

  # Charting
  fl_chart: ^0.68.0

  # Local database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0

  # FFI (DSP / pocketfft bindings)
  ffi: ^2.1.0

  # File system
  path_provider: ^2.1.0

  # Export / share
  share_plus: ^9.0.0

  # Preferences
  shared_preferences: ^2.2.0

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.0
  drift_dev: ^2.18.0
  mockito: ^5.4.0

flutter:
  uses-material-design: true
